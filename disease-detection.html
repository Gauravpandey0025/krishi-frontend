<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Plant Disease Detector</title>
</head>

<body style="font-family: Arial; text-align:center; margin-top:50px;">

  <h2>Upload Leaf Image</h2>

  <!-- Upload Box -->
  <div 
    onclick="document.getElementById('fileInput').click()" 
    style="border:2px dashed #999; padding:40px; cursor:pointer; width:300px; margin:auto;">
    
    Click here to upload image
    <input type="file" id="fileInput" accept="image/*" hidden onchange="handleFile(this)">
  </div>

  <br>

  <!-- Result -->
  <p id="result"></p>

  <script>
    let selectedFile = null;

    function handleFile(input) {
      selectedFile = input.files[0];
      if (!selectedFile) return;

      predict();
    }

    function predict() {
      if (!selectedFile) return;

      document.getElementById("result").innerText = "Processing...";

      const reader = new FileReader();

      reader.onload = function () {
        const base64Image = reader.result;

        fetch("https://pandeygaurav0025-disease-predictor.hf.space/run/predict", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            data: [base64Image]
          })
        })
        .then(res => res.json())
        .then(data => {
          document.getElementById("result").innerText = data.data[0];
        })
        .catch(err => {
          console.error(err);
          document.getElementById("result").innerText = "Error: " + err.message;
        });
      };

      reader.readAsDataURL(selectedFile);
    }
  </script>

</body>
</html>
