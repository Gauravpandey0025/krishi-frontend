<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Disease Detection | KrishiMitra - Government of Jharkhand</title>
  <meta name="description" content="Upload a leaf photo to detect plant diseases using AI-powered image analysis." />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://use.typekit.net/yjp3aho.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { 'sofia': ['sofia-pro', 'sans-serif'] },
          colors: {
            'jharkhand-green': '#228B22',
            'jharkhand-orange': '#FF8C00'
          }
        }
      }
    }
  </script>
</head>

<body class="font-sofia bg-gradient-to-br from-orange-50 to-green-50 min-h-screen">
  <main class="pt-20 pb-16">
    <div class="container mx-auto px-4">
      <div class="max-w-4xl mx-auto">

        <a href="index.html"
          class="inline-flex items-center text-jharkhand-green hover:underline mb-8 text-sm font-medium">
          <i data-lucide="arrow-left" class="w-4 h-4 mr-1"></i> Back to Home
        </a>

        <div class="text-center mb-12">
          <h1 class="text-4xl font-bold text-gray-900 mb-4">
            AI Plant Disease Detection
          </h1>
          <p class="text-lg text-gray-600">
            Upload a photo of a plant leaf and our AI model will identify if it has any disease
          </p>
        </div>

        <div class="bg-white rounded-xl shadow-lg p-8 mb-8">
          <div id="upload-area"
            class="border-2 border-dashed border-orange-300 rounded-xl p-12 text-center cursor-pointer hover:border-jharkhand-orange hover:bg-orange-50/50 transition-all"
            onclick="document.getElementById('file-input').click()">
            <i data-lucide="upload-cloud" class="w-16 h-16 text-jharkhand-orange mx-auto mb-4"></i>
            <p class="text-lg font-semibold text-gray-700 mb-2">Click to upload a leaf image</p>
            <p class="text-sm text-gray-500">Supports JPG, PNG, WEBP - max 10 MB</p>
            <input type="file" id="file-input" accept="image/*" class="hidden" onchange="handleFile(this)">
          </div>

          <div id="preview-container" class="hidden mt-6">
            <div class="flex flex-col md:flex-row gap-6 items-start">
              <div class="w-full md:w-1/2">
                <img id="preview-img" class="w-full rounded-lg shadow-md" alt="Uploaded leaf" />
              </div>
              <div class="w-full md:w-1/2 flex flex-col gap-4">
                <p class="text-sm text-gray-500" id="file-info"></p>
                <button onclick="analyzeImage()"
                  class="bg-jharkhand-orange text-white px-6 py-3 rounded-lg font-semibold hover:bg-orange-600 transition inline-flex items-center justify-center">
                  <i data-lucide="scan" class="w-5 h-5 mr-2"></i>
                  Analyze Leaf
                </button>
                <button onclick="resetUpload()"
                  class="border border-gray-300 text-gray-600 px-6 py-3 rounded-lg hover:bg-gray-50 transition text-sm">
                  Choose Different Image
                </button>
              </div>
            </div>
          </div>
        </div>

        <div id="results-section" class="hidden"></div>
      </div>
    </div>
  </main>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      window.lucide?.createIcons();
    });

    let selectedFile = null;
    let selectedBase64 = null;

    const HF_BASE = "https://pandeygaurav0025-disease-predictor.hf.space";
    const HF_FN = "predict";

    function refreshIcons() {
      setTimeout(() => window.lucide?.createIcons(), 0);
    }

    function handleFile(input) {
      const file = input.files[0];
      if (!file) return;

      if (file.size > 10 * 1024 * 1024) {
        alert('File too large. Max 10 MB.');
        input.value = '';
        return;
      }

      selectedFile = file;

      const reader = new FileReader();
      reader.onload = (e) => {
        selectedBase64 = e.target.result;
        document.getElementById('preview-img').src = selectedBase64;
        document.getElementById('file-info').textContent =
          `${file.name} • ${(file.size / 1024).toFixed(0)} KB`;
        document.getElementById('preview-container').classList.remove('hidden');
        document.getElementById('upload-area').classList.add('hidden');
        document.getElementById('results-section').classList.add('hidden');
        document.getElementById('results-section').innerHTML = '';
        refreshIcons();
      };
      reader.readAsDataURL(file);
    }

    function resetUpload() {
      selectedFile = null;
      selectedBase64 = null;
      document.getElementById('file-input').value = '';
      document.getElementById('preview-container').classList.add('hidden');
      document.getElementById('upload-area').classList.remove('hidden');
      document.getElementById('results-section').classList.add('hidden');
      document.getElementById('results-section').innerHTML = '';
      refreshIcons();
    }

    function extractPrediction(resultText) {
      let disease = "";
      let confidence = null;

      for (const rawLine of resultText.split("\n")) {
        const line = rawLine.trim();
        if (!line.startsWith("data:")) continue;

        const payload = line.replace(/^data:\s*/, "").trim();
        if (!payload || payload === "null" || payload === "[DONE]") continue;

        try {
          const parsed = JSON.parse(payload);

          if (parsed?.data && Array.isArray(parsed.data)) {
            const obj = parsed.data.find(item => item && typeof item === "object" && item.label);
            if (obj) {
              disease = obj.label;
              confidence = obj.confidence ?? null;
              break;
            }
          }

          if (parsed?.label) {
            disease = parsed.label;
            confidence = parsed.confidence ?? null;
            break;
          }
        } catch (e) {
          console.log("Skipping unparsable SSE payload:", payload);
        }
      }

      if (!disease) return null;

      return { disease, confidence };
    }

  async function analyzeImage() {
    if (!selectedFile) {
      alert("Please upload an image first.");
      return;
    }

    const results = document.getElementById("results-section");
    const HF_BASE = "https://pandeygaurav0025-disease-predictor.hf.space";
    const HF_FN = "predict";

    results.classList.remove("hidden");
    results.innerHTML = `
      <div class="bg-white rounded-xl shadow-lg p-8 text-center">
        <div class="animate-spin inline-block w-8 h-8 border-4 border-orange-600 border-t-transparent rounded-full mb-4"></div>
        <p class="text-gray-600">Analyzing your leaf image...</p>
      </div>
    `;

    try {
      const formData = new FormData();
      formData.append("files", selectedFile);

      const uploadRes = await fetch(`${HF_BASE}/gradio_api/upload`, {
        method: "POST",
        body: formData
      });

      const uploadText = await uploadRes.text();
      console.log("UPLOAD RAW:", uploadText);

      if (!uploadRes.ok) {
        throw new Error(`Upload failed: ${uploadRes.status}\n${uploadText}`);
      }

      let uploadJson;
      try {
        uploadJson = JSON.parse(uploadText);
      } catch {
        throw new Error(`Upload returned non-JSON:\n${uploadText}`);
      }

      console.log("UPLOAD JSON:", uploadJson);

      let uploadedPath = null;

      if (Array.isArray(uploadJson) && typeof uploadJson[0] === "string") {
        uploadedPath = uploadJson[0];
      } else if (uploadJson && Array.isArray(uploadJson.files) && uploadJson.files[0]) {
        uploadedPath = uploadJson.files[0];
      } else if (uploadJson && typeof uploadJson.path === "string") {
        uploadedPath = uploadJson.path;
      }

      if (!uploadedPath) {
        throw new Error(`Could not find uploaded file path.\nUpload response:\n${JSON.stringify(uploadJson, null, 2)}`);
      }

      const payload = {
        data: [
          {
            path: uploadedPath,
            meta: { _type: "gradio.FileData" }
          }
        ]
      };

      console.log("PREDICT PAYLOAD:", payload);

      const postRes = await fetch(`${HF_BASE}/gradio_api/call/${HF_FN}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });

      const postText = await postRes.text();
      console.log("POST RAW:", postText);

      if (!postRes.ok) {
        throw new Error(`Prediction start failed: ${postRes.status}\n${postText}`);
      }

      let postJson;
      try {
        postJson = JSON.parse(postText);
      } catch {
        throw new Error(`Prediction start returned non-JSON:\n${postText}`);
      }

      const eventId = postJson.event_id;
      if (!eventId) {
        throw new Error(`No event_id returned.\n${JSON.stringify(postJson, null, 2)}`);
      }

      const resultRes = await fetch(`${HF_BASE}/gradio_api/call/${HF_FN}/${eventId}`);
      const resultText = await resultRes.text();
      console.log("SSE RAW:", resultText);

      if (!resultRes.ok) {
        throw new Error(`Result fetch failed: ${resultRes.status}\n${resultText}`);
      }

      if (resultText.includes("event: error")) {
        throw new Error(`Space execution failed.\n${resultText}`);
      }

      let disease = "";
      let confidence = null;

      for (const rawLine of resultText.split("\n")) {
        const line = rawLine.trim();
        if (!line.startsWith("data:")) continue;

        const payloadText = line.replace(/^data:\s*/, "").trim();
        if (!payloadText || payloadText === "null" || payloadText === "[DONE]") continue;

        try {
          const parsed = JSON.parse(payloadText);
          console.log("SSE PARSED:", parsed);

          if (parsed?.data?.[0]?.label) {
            disease = parsed.data[0].label;
            confidence = parsed.data[0].confidence ?? null;
            break;
          }

          if (parsed?.label) {
            disease = parsed.label;
            confidence = parsed.confidence ?? null;
            break;
          }
        } catch (e) {
          console.log("SSE parse skip:", payloadText);
        }
      }

      if (!disease) {
        throw new Error(`Could not extract prediction.\n${resultText}`);
      }

      const isHealthy = disease.toLowerCase().includes("healthy");

      results.innerHTML = `
        <div class="bg-white rounded-xl shadow-lg overflow-visible">
          <div class="px-8 py-5 ${isHealthy ? "bg-green-700" : "bg-red-700"}">
            <h3 class="text-xl font-bold text-white">${isHealthy ? "Healthy Plant" : "Disease Detected"}</h3>
          </div>
          <div class="p-8">
            <div class="text-center mb-6">
              <div class="text-4xl font-bold ${isHealthy ? "text-green-700" : "text-red-700"} mb-2">
                ${disease}
              </div>
              <p class="text-gray-500">AI Prediction Result</p>
            </div>

            ${confidence != null ? `
              <div class="max-w-md mx-auto mb-6">
                <div class="flex justify-between text-sm text-gray-600 mb-1">
                  <span>Model Confidence</span>
                  <span class="font-bold ${isHealthy ? "text-green-700" : "text-red-700"}">${Number(confidence).toFixed(1)}%</span>
                </div>
                <div class="w-full bg-gray-200 rounded-full h-3">
                  <div class="h-3 ${isHealthy ? "bg-green-500" : "bg-red-500"} rounded-full" style="width:${Math.min(Number(confidence), 100)}%"></div>
                </div>
              </div>
            ` : ""}
          </div>
        </div>
      `;
    } catch (error) {
      console.error(error);
      results.innerHTML = `
        <div class="bg-white rounded-xl shadow-lg p-8 border-l-4 border-red-500">
          <h3 class="text-lg font-bold text-red-700">Error</h3>
          <pre class="text-sm text-gray-700 whitespace-pre-wrap">${error.message}</pre>
        </div>
      `;
    }
  }
</script>

  </script>
</body>

</html>
